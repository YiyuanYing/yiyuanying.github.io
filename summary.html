<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title_summary">Year-end Summary | Yiyuan Ying</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .summary-page {
            max-width: 1000px;
            margin-bottom: 0;
        }

        .summary-header {
            width: 100%;
            margin-bottom: 28px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
        }

        .summary-gallery {
            display: flex;
            flex-direction: column;
            gap: 36px;
            width: 100%;
        }

        .summary-item {
            text-align: center;
        }

        .summary-item img {
            width: 100%;
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .summary-item p {
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <header class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="brand-link">
                <img src="images/profile.jpg" alt="Profile Photo" class="nav-profile-photo" onerror="this.onerror=null;this.src='https://via.placeholder.com/150'">
                <h1 data-i18n="name">Yiyuan Ying</h1>
            </a>
        </div>

        <nav class="nav-center">
            <ul class="nav-links">
                <li><a href="index.html#about" data-i18n="nav_about">About</a></li>
                <li><a href="projects.html" data-i18n="nav_projects">Projects</a></li>
                <li><a href="index.html#timeline" data-i18n="nav_timeline">Timeline</a></li>
                <li><a href="summary.html" class="active" data-i18n="nav_summary">Summary</a></li>
                <li><a href="cv.html" data-i18n="nav_cv">CV</a></li>
            </ul>
        </nav>

        <div class="nav-right">
            <button id="theme-toggle" class="btn-icon"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <section id="year-end-summary" class="summary-page">
            <div class="summary-header">
                <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> <span data-i18n="back_home">Back to Home</span></a>
            </div>

            <h2 data-i18n="year_end_summary_title">Year-end Summary</h2>

            <div class="summary-gallery">
                <div class="summary-item">
                    <img src="images/2025final.jpg" onerror="this.onerror=null;this.src='https://via.placeholder.com/800x500'" alt="2025 Year-end Summary">
                    <p data-i18n="year_end_summary_2025_caption">2025 Photography Summary</p>
                </div>

                <div class="summary-item">
                    <img src="images/2024final.jpg" onerror="this.onerror=null;this.src='https://via.placeholder.com/800x500'" alt="2024 Year-end Summary">
                    <p data-i18n="year_end_summary_caption">2024 Photography Summary</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="social-links">
            <a href="https://github.com/YiyuanYing" target="_blank"><i class="fab fa-github"></i></a>
            <a href="mailto:yiyuanying@outlook.com"><i class="fas fa-envelope"></i></a>
        </div>
        <div class="footer-copyright">
            &copy; 2021-2025 Verso_X | Yiyuan Ying
        </div>
    </footer>

    <script src="js/translations.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
