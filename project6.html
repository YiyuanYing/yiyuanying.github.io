<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page_title_project6">ROBOCON2026 - Quadruped &amp; Kung Fu Quest | Yiyuan Ying</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Specific styles for project detail page */
        .project-detail-container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            animation: fadeInUp 0.6s ease forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .project-detail-img {
            width: 100%;
            max-height: 620px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--bg-color);
        }
        .back-btn:hover {
            color: var(--accent-color);
            transform: translateX(-5px);
            background: rgba(49, 130, 206, 0.1);
        }
        .project-detail-container h2 {
            text-align: center;
            margin-bottom: 20px;
            display: block;
        }
        .project-detail-container h2::after {
            left: 50%;
            transform: translateX(-50%);
        }
        /* Content Typography */
        .project-content {
            line-height: 1.8; /* Larger line spacing */
            color: var(--text-color);
        }
        .project-content p {
            margin-bottom: 1.5em; /* 1.5x spacing between paragraphs */
            text-align: justify; /* Optional: makes text look neater */
        }
        .project-content ul, .project-content ol {
            padding-left: 2em; /* 2 characters indentation */
            margin-bottom: 1.5em;
        }
        .project-content li {
            margin-bottom: 0.5em;
        }
        /* Image Row Styles */
        .project-images-row {
            display: flex;
            gap: 20px;
            margin: 30px 0;
            justify-content: center;
            flex-wrap: wrap;
        }
        .project-image-item {
            flex: 1;
            min-width: 300px;
            text-align: center;
        }
        .project-image-item img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }
        .image-caption {
            font-size: 0.9rem;
            color: var(--text-color);
            font-weight: 500;
        }
        .project-media-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            margin: 30px 0;
        }
        .project-media-stack .project-image-item {
            width: 100%;
            text-align: center;
        }
        .project-module-figure {
            margin: 30px 0;
            text-align: center;
        }
        .project-module-images {
            display: flex;
            justify-content: center;
            align-items: stretch;
            gap: 20px;
            margin-bottom: 10px;
        }
        .project-module-images img {
            width: auto;
            height: 360px;
            max-width: calc(50% - 10px);
            object-fit: contain;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }
        @media (max-width: 760px) {
            .project-module-images {
                flex-direction: column;
                align-items: center;
            }
            .project-module-images img {
                width: 100%;
                max-width: 100%;
                height: auto;
                max-height: 420px;
            }
        }
    </style>
</head>
